login:
  title: Login
  form:
    agreeToPrivacyPolicy(rich): Logując się, zgaszasz się na ${linkToPrivacyPolicy(Politykę Prywatności)}.
  signup(rich): Nie masz jeszcze konta? ${linkToSignup(Utwórz je teraz)}!
