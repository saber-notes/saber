    hi: Cześć $u!
    almostDone: Prawie gotowy na synchronizacje, kliknij aby skończyć logowanie
    loggedIn: Zalogowano przez Nextcloud
  ncLoginStep:
    whereToStoreData: 'Wybierz gdzie przechowywać twoje dane:'
    saberNcServer: Serwer Nextcloud Saber
    otherNcServer: Inny serwer Nextcloud
    serverUrl: Serwer URL
    loginWithSaber: Zaloguj przez Saber
    loginWithNextcloud: Zaloguj przez Nextcloud
    loginFlow:
      pleaseAuthorize: Proszę autoryzuj Saber do używania twojego konta Nextcloud
      followPrompts: Proszę postępuj zgodnie z poleceniami interfejsu Nextcloud
      browserDidntOpen: Strona logowania nie otworzyła się? Kliknij tutaj
  encLoginStep:
    enterEncPassword: 'Aby chronić twoje dane, podaj proszę hasło szyfrowania:'
    newToSaber: Nowy w Saber? Utwórz nowe hasło szyfrowania.
    encPassword: Hasło szyfrowania
    encFaqTitle: Często zadawane pytania (FAQ)
    wrongEncPassword: Odszyfrowywanie przy użyciu podanego hasła nie powiodło się. Spróbuj wpisać je ponownie.
    connectionFailed: Coś poszło nie tak w trakcie łączenia się z serwerem. Spróbuj ponownie później.
    encFaq:
    - q: Czym jest hasło użyte do szyfrowania? Dlaczego korzystać z dwóch haseł?
      a: |-
        Hasło do Nextcloud służy do uzyskania dostępu do chmury. Hasło szyfrujące „miesza” Twoje dane, zanim w ogóle dotrą one do chmury.
        Nawet jeśli ktoś uzyska dostęp do Twojego konta Nextcloud, Twoje notatki pozostaną bezpieczne i zaszyfrowane za pomocą osobnego hasła. Zapewnia to drugą warstwę zabezpieczeń chroniącą Twoje dane.
        Nikt nie może uzyskać dostępu do Twoich notatek na serwerze bez hasła szyfrującego, ale oznacza to również, że jeśli zapomnisz swojego hasła szyfrującego, stracisz dostęp do swoich danych.
    - q: Nie ustawiłem jeszcze hasła szyfrującego. Jak mogę je uzyskać?
      a: |-
        Utwórz nowe hasło i wpisz je poniżej. 
        Saber wygeneruje klucze szyfrowania z tego hasła automatycznie.
    - q: Czy mogę użyć tego samego hasła co do konta Nextcloud?
      a: Tak, ale pamiętaj że łatwiej będzie uzyskać dostęp do twoich notatek osobie która ma/może uzyskać dostęp do twojego konta Nextcloud (np. administratorowi serwera).
profile:
  title: Mój profil
  logout: Wyloguj
  quotaUsage: Wykorzystujesz $used z $total ($percent%)
  connectedTo: Połączono z
  quickLinks:
    serverHomepage: Strona główna serwera
    deleteAccount: Usuń konto
  faqTitle: Często zadawane pytania (FAQ)
  faq:
  - q: Czy utracę moje notatki jeżeli się wyloguje?
    a: Nie. Twoje notatki pozostaną zarówno na twoim urządzeniu jak i na serwerze. Nie będą synchronizowane dopóki nie zalogujesz się ponownie. Upewnij się, że synchronizacja została ukończona przed wylogowaniem aby nie utracić żadnych danych (zobacz status synchronizacji na stronie głównej).
  - q: Jak mogę zmienić hasło do Nextcloud?
    a: Wejdź na stronę swojego serwera i się zaloguj. Następnie przejdź do Settings > Security > Change password (Ustawienia > Bezpieczeństwo>Zmiana hasła). Po zmianie hasła należy wylogować się z serwera w Saber, a następnie zalogować ponownie za pomocą nowego hasła.
  - q: Jak mogę zmienić moje hasło szyfrowania?
    a: |-
      0. Upewnij się, że synchronizacja została zakończona (zobacz postęp synchronizacji na ekranie głównym).
      1. Wyloguj się z Saber.
      2. Przejdź na stronę swojego serwera i usuń folder 'Saber'. Spowoduje to usunięcie wszystkich Twoich notatek z serwera.
      3. Zaloguj się ponownie do Saber. Podczas logowania możesz wybrać nowe hasło szyfrowania.
      4. Nie zapomnij wylogować się i zalogować ponownie do Saber również na swoich innych urządzeniach.
  - q: Jak mogę usunąć moje konto?
    a: |-
      Kliknij "@:profile.quickLinks.deleteAccount" przycisk powyżej i zaloguj się jeżeli to wymagane.
      Jeśli korzystasz z oficjalnego serwera Saber, Twoje konto zostanie usunięte po tygodniu. W tym czasie możesz skontaktować się ze mną pod adresem adilhanney@disroot.org, aby anulować usunięcie.
      Jeśli korzystasz z serwera zewnętrznego, opcja usunięcia konta może nie być dostępna: aby uzyskać więcej informacji, musisz zapoznać się z polityką prywatności serwera.
