  title: התחבר
  form:
    agreeToPrivacyPolicy(rich): על ידי התחברות, אתה מסכים ל ${linkToPrivacyPolicy(מדיניות הפרטיות)}.
  signup(rich): אין לך עוד משתמש ${linkToSignup(הירשם עכשיו)}!
