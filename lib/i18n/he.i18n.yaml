sentry:
  consent:
    title: האם לעזור בשיפור Saber?
    description:
      question: האם ברצונך לדווח אוטומטית על שגיאות לא צפויות? זה יעזור לי לזהות ולתקן בעיות יותר מהר.
      scope: הדיווחים עשויים להכיל מידע על השגיאה ועל מכשירך. עשיתי כל מאמץ על מנת לסנן החוצה נתונים אישיים, אבל ייתכן כי חלק יישארו בדיווח.
      currentlyOff: אם הסכמתך תוענק, הדיווח על השגיאות יופעל בעת פתיחת היישום מחדש.
      currentlyOn: אם הסכמתך תישלל, נא לפתוח מחדש את היישום בשביל להשבית את הדיווח על השגיאות.
      learnMoreInPrivacyPolicy(rich): מידע נוסף ניתן למצוא ב${link(מדיניות הפרטיות)}.
