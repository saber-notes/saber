    hi: אהלן, $u!
    almostDone: הסנכרון כמעט מוכן, יש ללחוץ בשביל להשלים את הכניסה
    loggedIn: נכנסת עם Nextcloud
  ncLoginStep:
    whereToStoreData: "נא לבחור היכן ברצונך לאחסן את הנתונים:"
    saberNcServer: שרת ה־Nextcloud של Saber
    otherNcServer: שרת Nextcloud אחר
    serverUrl: כתובת שרת
    loginWithSaber: כניסה עם Saber
    loginWithNextcloud: כניסה עם Nextcloud
    loginFlow:
      pleaseAuthorize: נא לתת ל־Saber הרשאה לגשת לחשבון Nextcloud שלך
      followPrompts: נא לעקוב אחר ההוראות הבאות בממשק של Nextcloud
      browserDidntOpen: עמוד הכניסה לא נפתח? נא ללחוץ כאן
  encLoginStep:
    enterEncPassword: "לצורך הגנה על הנתונים שלך, נא להקליד את סיסמת ההצפנה שלך:"
    newToSaber: פעם ראשונה ב־Saber? אפשר פשוט להקליד סיסמת הצפנה חדשה.
    encPassword: סיסמת הצפנה
    encFaqTitle: שאלות ותשובות
    wrongEncPassword: פענוח ההצפנה עם הסיסמה שסופקה נכשל. נא לנסות להקליד אותה שוב.
    connectionFailed: משהו השתבש בעת ההתחברות לשרת. נא לנסות שוב מאוחר יותר.
    encFaq:
    - q: מהי סיסמת הצפנה? מדוע להשתמש בשתי סיסמאות?
      a: |-
        הסיסמה ל־Nextcloud משמשת לגישה לענן. סיסמת ההצפנה „מבלגנת” את הנתונים שלך ביישום לפני שהם מגיעים לענן.
        אפילו אם מישהו משיג גישה לחשבון ה־Nextcloud שלך, הפתקים שלך יישארו בטוחים ומוצפנים עם סיסמה נפרדת. דבר זה מעניק לך שכבת אבטחה שנייה להגנה על הנתונים שלך.
        ללא סיסמת ההצפנה שלך, לאף אחד לא תהיה גישה לפתקים שלך בשרת, אך זה גם אומר שאם סיסמת ההצפנה שלך תישכח, לא תהיה לך יותר גישה לנתונים.
    - q: עדיין לא הגדרתי סיסמת הצפנה? היכן מקבלים אחת?
      a: |-
        נא לבחור סיסמת הצפנה חדשה ולהקליד אותה למעלה.
        ‏Saber ייצור את מפתחות ההצפנה שלך באופן אוטומטי מסיסמה זו.
    - q: האם אפשר להשתמש באותה סיסמה כמו לחשבון Nextcloud שלי?
      a: כן, אך יש לקחת בחשבון שיהיה יותר קל למנהלי השרת או לאנשים אחרים לגשת לפתקים שלך אם הם משיגים גישה לחשבונך ב־Nextcloud.
profile:
  title: הפרופיל שלי
  logout: התנתק
  quotaUsage: נעשה שימוש ב־$used מתוך $total (‏$percent‏%)
  connectedTo: התחברת אל
  quickLinks:
    serverHomepage: עמוד הבית של השרת
    deleteAccount: מחק משתמש
  faqTitle: שאלות ותשובות
  faq:
  - q: אני אאבד את הפתקים שלי אם אני אתנתק?
    a: לא. ההערות שלך יישארו גם במכשיר וגם בשרת. הם לא יסונכרנו עם השרת עד שתתחבר חזרה. ודא שהסנכרון הושלם לפני היציאה כדי שלא תאבד נתונים (ראה את התקדמות הסנכרון במסך הבית).
  - q: איך לשנות את הסיסמה שלי ל־Nextcloud?
    a: עבור לאתר השרת שלך והתחבר. לאחר מכן עבור אל הגדרות > אבטחה > שנה סיסמה. תצטרך להתנתק ולהיכנס שוב ל-Saber לאחר שינוי הסיסמה שלך.
  - q: איך אני משנה את הסיסמא המוצפנת שלי?
    a: |-
      0. ודא שהסנכרון הושלם (ראה את התקדמות הסנכרון במסך הבית).
      1. התנתק מ Saber.
      2. עבור אל אתר האינטרנט של השרת שלך ומחק את התיקיה 'Saber' שלך. פעולה זו תמחק את כל ההערות שלך מהשרת.
      3. היכנס שוב ל-Saber. אתה יכול לבחור סיסמת הצפנה חדשה בעת הכניסה.
      4. אל תשכח להתנתק ולהתחבר שוב ל-Saber גם במכשירים האחרים שלך.
  - q: איך אני יכול למחוק את החשבון שלי?
    a: |-
      הקש על הלחצן "@:profile.quickLinks.deleteAccount" למעלה, והיכנס במידת הצורך.
       אם אתה משתמש בשרת Saber הרשמי, החשבון שלך יימחק לאחר תקופת חסד של שבוע. ניתן ליצור איתי קשר בכתובת adilhanney@disroot.org במהלך תקופה זו כדי לבטל את המחיקה.
       אם אתה משתמש בשרת של צד שלישי, ייתכן שלא תהיה אפשרות למחוק את חשבונך: תצטרך לעיין במדיניות הפרטיות של השרת לקבלת מידע נוסף.
