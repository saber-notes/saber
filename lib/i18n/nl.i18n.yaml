profile:
  title: Mijn profiel
  logout: Uitloggen
  quotaUsage: $used van $total in gebruik ($percent%)
  connectedTo: Verbonden met
  quickLinks:
    serverHomepage: Server thuispagina
    deleteAccount: Verwijder account
  faqTitle: Vaak gevraagd
  faq:
  - q: Ben ik mijn notities kwijt als ik uitlog?
    a: Nee. Je notities blijven zowel op je apparaat als op de server staan. Ze worden pas gesynchroniseerd met de server als je weer inlogt. Zorg dat de synchronisatie voltooid is voordat je uitlogt, zodat je geen data verliest (zie de synchronisatievoortgang op het startscherm).
  - q: Hoe verander ik mijn Nextcloud wachtwoord?
    a: Ga naar de website van je server en log in. Ga dan naar Instellingen > Beveiliging > Wachtwoord wijzigen. Je moet uitloggen en weer inloggen op Saber nadat je je wachtwoord hebt veranderd.
  - q: Hoe verander ik mijn versleutelingswachtwoord?
    a: |-
      0. Zorg dat de synchronisatie voltooid is (zie de voortgang van synchronisatie op het startscherm).
      1. Log uit bij Saber.
      2. Ga naar de website van je server en verwijder je 'Saber'-map. Dit verwijdert al je notities van de server.
      3. Log weer in op Saber. Je kunt een nieuw encryptiewachtwoord kiezen bij het inloggen.
      4. Vergeet niet uit te loggen en weer in te loggen op Saber op je andere apparaten.
  - q: Hoe kan ik mijn account verwijderen?
    a: |-
      Tik op de knop "@:profile.quickLinks.deleteAccount" hierboven en log in indien nodig.
      Als je de officiële Saber-server gebruikt, wordt je account na een periode van 1 week verwijderd. Je kunt me in deze periode op adilhanney@disroot.org contacteren om de verwijdering te annuleren.
      Als je een server van derden gebruikt, is er mogelijk geen optie om je account te verwijderen: je moet het privacybeleid van de server raadplegen voor meer informatie.
