    saberNcServer: Saber's Nextcloud server
    otherNcServer: Andere Nextcloud server
    serverUrl: Server URL
    loginWithSaber: Inloggen met Saber
    loginWithNextcloud: Inloggen met Nextcloud
  encLoginStep:
    enterEncPassword: 'Om uw gegevens te beschermen, geef hier uw versleutelingswachtwoord op:'
    newToSaber: Nieuw bij Saber? Bedenk gewoon een nieuw wachtwoord.
    encPassword: Versleutelingswachtwoord
    encFaqTitle: Vaak gevraagd
    wrongEncPassword: Ontsleuteling gefaald met gegeven wachtwoord, probeer opnieuw.
    connectionFailed: Er ging iets fout met de verbinding met de server. Probeer later opnieuw.
    encFaq:
    - q: Wat is een versleutelingswachtwoord? Waarom moet ik twee wachtwoorden gebruiken?
      a: |-
        Het Nextcloud-wachtwoord wordt gebruikt om toegang te krijgen tot de cloud. Het encryptiewachtwoord versleutelt je data voordat deze de cloud bereikt.
        Zelfs als iemand toegang krijgt tot je Nextcloud-account, blijven je notities veilig en versleuteld met een apart wachtwoord. Dit biedt je een tweede beveiligingslaag om je data te beschermen.
        Niemand kan je notities op de server inzien zonder je encryptiewachtwoord, maar dit betekent ook dat als je je encryptiewachtwoord vergeet, je de toegang tot je gegevens verliest.
    - q: Ik heb nog geen versleutelingswachtwoord gebruikt, waar krijg ik deze?
      a: |-
        Kies een nieuw versleutelingswachtwoord en voer hem hierboven in.
        Saber zal automatisch versleutelingssleutels maken van dit wachtwoord.
    - q: Kan ik hetzelfde wachtwoord als my Nextcloud wachtwoord gebruiken?
      a: Ja, maar houd er rekening mee dat het makkelijker is voor de serverbeheerder of iemand anders om toegang te krijgen tot je notities als ze toegang krijgen tot je Nextcloud-account.
