login:
  ncLoginStep:
    loginFlow:
      followPrompts: Volg de instructies op de Nextcloud pagina
      browserDidntOpen: Is de login pagina niet geopend? Klik hier
      pleaseAuthorize: Autoriseer Saber bij je Nextcloud account
