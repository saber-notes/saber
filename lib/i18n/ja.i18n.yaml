sentry:
  consent:
    title: Saver アプリの改善を助けますか？
    description:
      question: 予期せぬエラーを自動的に報告しますか？問題の早期解決を助けます。
      scope: レポートには、エラーとデバイスに関する情報が含まれている場合があります。 個人データをフィルタアウトするために、すべての努力をしましたが、一部残っている可能性があります。
      currentlyOff: 同意すると、アプリの再起動後にエラーのレポートが有効になります。
      currentlyOn: 同意を取り消す場合は、アプリを再起動することでエラーレポートが無効になります。
      learnMoreInPrivacyPolicy(rich): ${link(プライバシーポリシー)}で詳細を確認してください。
