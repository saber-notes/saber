sentry:
  consent:
    title: Ajudar a melhorar Saber?
    description:
      question: Gostaria de reportar automaticamente erros inesperados? Isto ajuda-me a identificar e corrigir erros mais rápido.
      scope: Os reportes podem conter informações sobre os erros e o seu dispositivo. Tentei o máximo possível remover todas as informações pessoais, mas algumas talvez continuem.
      currentlyOff: Se dar consentimento, os reportes de erro serão ativados após a reinicialização da app.
      currentlyOn: Se revogar o consentimento, por favor reinicie a app para desativar os reportes de erro.
      learnMoreInPrivacyPolicy(rich): "Veja mais em: ${link(privacy policy)}."
    answers:
      yes: Sim
      no: Não
      later: Pergunte-me mais tarde
