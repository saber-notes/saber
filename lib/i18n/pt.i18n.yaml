profile:
  title: O meu perfil
  logout: Sair
  quickLinks:
    serverHomepage: Página inicial do servidor
    deleteAccount: Apagar a conta
  faq:
  - q: Perderei as minhas notas se eu sair da minha conta?
    a: Não. As suas notas permanecerão tanto no seu dispositivo quanto no servidor. Elas não serão sincronizadas com o servidor até fazer login novamente. Tenha certeza que a sincronização foi finalizada antes de sair, de modo que não perca nenhum dado (veja o progresso da sincronização no ecrã inicial).
  - q: Como mudo a minha palavra-passe do Nextcloud?
    a: Vá para o website do seu servidor e faça login. Depois vá para Configurações > Segurança > Mudar palavra-passe. Precisará sair da conta e fazer login novamente no Saber depois de mudar a sua palavra-passe.
  - q: Como mudo a minha palavra-passe de criptografia?
  - q: Como posso apagar a minha conta?
    a: |-
      Toque no "@:profile.quickLinks.deleteAccount" botão acima e faça login se necessário.
      Se estiver a usar o servidor oficial do Saber, a sua conta será apagada depois de um período de carência de uma semana. Pode entrar em contacto comigo em adilhanney@disroot.org durante este período para cancelar o apagar.
      Se usar um servidor de terceiros, pode ser que não haja uma opção de apagar a sua conta: precisará consultar a política de privacidade do servidor para mais informações.
