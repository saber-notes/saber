login:
  title: Login
  form:
    agreeToPrivacyPolicy(rich): Ao fazer login, concorda com a ${linkToPrivacyPolicy(Política de Privacidade)}.
  signup(rich): Ainda não tem uma conta? ${linkToSignup(Registe-se agora)}!
  status:
    loggedOut: Desconectado
    tapToLogin: Toque para fazer login com o Nextcloud
    loggedIn: Logado com o Nextcloud
    hi(OUTDATED): Olá, $u!
    almostDone(OUTDATED): Quase pronto para sincronizar, toque para finalizar o login
  ncLoginStep:
    loginFlow:
      pleaseAuthorize(OUTDATED): Por favor, autorize o Saber a acessar sua conta Nextcloud
      followPrompts(OUTDATED): Por favor, siga as instruções na interface do Nextcloud
      browserDidntOpen(OUTDATED): A página de login não abriu? Clique aqui
    whereToStoreData(OUTDATED): "Escolha onde você deseja armazenar seus dados:"
    saberNcServer(OUTDATED): Servidor Nextcloud do Saber
    otherNcServer(OUTDATED): Outro servidor Nextcloud
    serverUrl(OUTDATED): URL do servidor
    loginWithSaber(OUTDATED): Entrar com Saber
    loginWithNextcloud(OUTDATED): Fazer login com o Nextcloud
  encLoginStep:
    encFaq(OUTDATED):
    - q(OUTDATED): O que é uma senha de criptografia? Por que usar duas senhas?
      a(OUTDATED): |-
        A senha do Nextcloud é usada para acessar a nuvem. A senha de criptografia "scrambles" seus dados antes que eles cheguem à nuvem.
        Mesmo que alguém acesse sua conta do Nextcloud, suas anotações permanecerão seguras e criptografadas com uma senha separada. Isso lhe fornece uma segunda camada de segurança para proteger seus dados.
        Ninguém pode acessar suas anotações no servidor sem sua senha de criptografia, mas isso também significa que se você esquecer sua senha de criptografia, perderá o acesso aos seus dados.
    - q(OUTDATED): Eu ainda não configurei uma senha de criptografia. Onde eu a obtenho?
      a(OUTDATED): |-
        Escolha uma nova senha de criptografia e insira-a acima.
        O Saber gerará suas chaves de criptografia automaticamente a partir desta senha.
    - q(OUTDATED): Posso usar a mesma senha da minha conta Nextcloud?
      a(OUTDATED): Sim, mas tenha em mente que seria mais fácil para o administrador do servidor ou outra pessoa acessar suas anotações se obtiverem acesso à sua conta Nextcloud.
    enterEncPassword(OUTDATED): "Para proteger seus dados, por favor, insira sua senha de criptografia:"
    newToSaber(OUTDATED): Novo no Saber? Basta inserir uma nova senha de criptografia.
    encPassword(OUTDATED): senha de criptografia
    encFaqTitle(OUTDATED): Perguntas frequentes
    wrongEncPassword(OUTDATED): Falha na descriptografia com a senha fornecida. Por favor, tente inseri-la novamente.
    connectionFailed(OUTDATED): Algo deu errado ao conectar ao servidor. Por favor, tente novamente mais tarde.
  notYou(rich,OUTDATED): Não você? ${undoLogin(Escolher outra conta)}.
profile:
  title: O meu perfil
  logout: Sair
  quickLinks:
    serverHomepage: Página inicial do servidor
    deleteAccount: Apagar a conta
  faq:
  - q: Perderei as minhas notas se eu sair da minha conta?
    a: Não. As suas notas permanecerão tanto no seu dispositivo quanto no servidor. Elas não serão sincronizadas com o servidor até fazer login novamente. Tenha certeza que a sincronização foi finalizada antes de sair, de modo que não perca nenhum dado (veja o progresso da sincronização no ecrã inicial).
  - q: Como mudo a minha palavra-passe do Nextcloud?
    a: Vá para o website do seu servidor e faça login. Depois vá para Configurações > Segurança > Mudar palavra-passe. Precisará sair da conta e fazer login novamente no Saber depois de mudar a sua palavra-passe.
  - q: Como mudo a minha palavra-passe de criptografia?
  - q: Como posso apagar a minha conta?
    a: |-
      Toque no "@:profile.quickLinks.deleteAccount" botão acima e faça login se necessário.
      Se estiver a usar o servidor oficial do Saber, a sua conta será apagada depois de um período de carência de uma semana. Pode entrar em contacto comigo em adilhanney@disroot.org durante este período para cancelar o apagar.
      Se usar um servidor de terceiros, pode ser que não haja uma opção de apagar a sua conta: precisará consultar a política de privacidade do servidor para mais informações.
