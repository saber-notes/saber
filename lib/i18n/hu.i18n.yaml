  encLoginStep:
    enterEncPassword: "Az adatai védelme érdekében kérjük, adja meg a titkosítási jelszavát:"
    newToSaber: Először használja a Saber-t? Adjon meg egy új titkosítási jelszót.
    encPassword: Titkosítási jelszó
    encFaqTitle: Gyakran ismételt kérdések
    wrongEncPassword: A megadott jelszóval a visszafejtés nem sikerült. Kérjük, próbálja meg újra megadni.
    connectionFailed: Hiba történt a szerverhez való csatlakozás során. Kérjük, próbálja újra később.
    encFaq:
    - q: Mi az a titkosítási jelszó? Miért van szükség két jelszóra?
      a: |-
        A Nextcloud jelszó a felhőhöz való hozzáféréshez szükséges. A titkosítási jelszó már azelőtt „összekeveri” az adatait, hogy azok a felhőbe kerülnének.
        Még ha valaki hozzá is fér a Nextcloud-fiókjához, a jegyzetei továbbra is biztonságban maradnak, mivel külön titkosítási jelszó védi őket. Ez egy második védelmi réteget biztosít az adatai számára.
        A szerveren senki sem férhet hozzá a jegyzeteihez a titkosítási jelszó nélkül, de ez azt is jelenti, hogy ha elfelejti a titkosítási jelszavát, elveszíti a hozzáférést az adataihoz.
    - q: Még nem állítottam be titkosítási jelszót. Hol szerezhetem meg?
      a: |-
        Válasszon egy új titkosítási jelszót, és adja meg fent.
        A Saber automatikusan létrehozza a titkosítási kulcsokat ebből a jelszóból.
    - q: Használhatom ugyanazt a jelszót, mint a Nextcloud-fiókomhoz?
      a: Igen, de fontos figyelembe venni, hogy így a szerver adminisztrátora vagy más személy könnyebben hozzáférhet a jegyzeteihez, ha hozzájut a Nextcloud-fiókjához.
profile:
  title: Profilom
  logout: Kijelentkezés
  quotaUsage: "Felhasználva: $used / $total ($percent%)"
  connectedTo: "Csatlakozva:"
  quickLinks:
    serverHomepage: Szerver kezdőlapja
    deleteAccount: Fiók törlése
  faqTitle: Gyakran ismételt kérdések
  faq:
  - q: Elveszítem a jegyzeteimet, ha kijelentkezem?
    a: Nem. A jegyzetei mind az eszközén, mind a szerveren megmaradnak. A szerverrel csak akkor lesznek szinkronizálva, ha újra bejelentkezik. Mielőtt kijelentkezik, győződjön meg arról, hogy a szinkronizálás befejeződött, különben adatvesztés történhet (a kezdőképernyőn látható a szinkronizálás állapota).
  - q: Hogyan változtatom meg a Nextcloud jelszavamat?
    a: Nyissa meg a szerver weboldalát, és jelentkezzen be. Ezután menjen a Beállítások > Biztonság > Jelszó módosítása menüpontra. A jelszó módosítása után ki kell jelentkeznie a Saberből, majd újra be kell jelentkeznie.
  - q: Hogyan változtatom meg a titkosítási jelszavamat?
    a: |-
      0. Győződjön meg arról, hogy a szinkronizálás befejeződött (a szinkronizálás állapotát a kezdőképernyőn láthatja).
      1. Jelentkezzen ki a Saberből.
      2. Nyissa meg a szerver weboldalát, és törölje a „Saber” mappát. Ez minden jegyzetét törli a szerverről.
      3. Jelentkezzen be újra a Saberbe. Bejelentkezéskor új titkosítási jelszót választhat.
      4. Ne felejtkezzen el kijelentkezni, majd újra bejelentkezni a Saberbe a többi eszközén is.
  - q: Hogyan törölhetem a fiókomat?
    a: |-
      Koppintson a fenti „@:profile.quickLinks.deleteAccount” gombra, és szükség esetén jelentkezzen be.
      Ha a hivatalos Saber szervert használja, a fiókja 1 hetes türelmi idő után törlésre kerül. Ebben az időszakban a törlés visszavonásához vegye fel a kapcsolatot a következő e-mail címen: adilhanney@disroot.org.
      Ha harmadik féltől származó szervert használ, előfordulhat, hogy nincs lehetőség a fiók törlésére: további információért tekintse meg a szerver adatvédelmi szabályzatát.
