login:
  form:
    agreeToPrivacyPolicy(rich,OUTDATED): Увійшовши в систему, ви погоджуєтеся з ${linkToPrivacyPolicy(Політика конфіденційності)}.
  status:
    loggedOut(OUTDATED): Вийшов з системи
    tapToLogin(OUTDATED): Натисніть для входу через Nextcloud
    hi(OUTDATED): Привіт, $u!
    almostDone(OUTDATED): Майже готово до синхронізації, натисніть, щоб завершити вхід
    loggedIn(OUTDATED): Увійшов через Nextcloud
  ncLoginStep:
    loginFlow:
      pleaseAuthorize(OUTDATED): Будь ласка, авторизуйте Saber для доступу до вашого облікового запису Nextcloud
      followPrompts(OUTDATED): Будь ласка, дотримуйтесь інструкцій у інтерфейсі Nextcloud
      browserDidntOpen(OUTDATED): Сторінка входу не відкрилася? Натисніть сюди
    whereToStoreData(OUTDATED): "Оберіть, де ви хочете зберігати ваші дані:"
    saberNcServer(OUTDATED): Сервер Nextcloud Saber
    otherNcServer(OUTDATED): Інший сервер Nextcloud
    serverUrl(OUTDATED): URL сервера
    loginWithSaber(OUTDATED): Увійти через Saber
    loginWithNextcloud(OUTDATED): Увійти через Nextcloud
  encLoginStep:
    encFaq:
    - q(OUTDATED): Що таке пароль шифрування? Чому використовувати два паролі?
      a(OUTDATED): |-
        Пароль Nextcloud використовується для доступу до хмари. Пароль шифрування "scrambles" заплутує ваші дані ще до того, як вони потраплять у хмару.
        Навіть якщо хтось отримає доступ до вашого облікового запису Nextcloud, ваші нотатки залишаться в безпеці та зашифровані окремим паролем. Це забезпечує вам другий рівень безпеки для захисту ваших даних.
        Ніхто не може отримати доступ до ваших нотаток на сервері без вашого пароля шифрування, але це також означає, що якщо ви забудете свій пароль шифрування, ви втратите доступ до ваших даних.
    - q(OUTDATED): Я ще не встановлював пароль шифрування. Де я його отримаю?
      a(OUTDATED): |-
        Оберіть новий пароль шифрування та введіть його вище.
        Saber автоматично згенерує ваші ключі шифрування з цього пароля.
    - q(OUTDATED): Чи можу я використовувати той самий пароль для свого облікового запису Nextcloud?
      a(OUTDATED): Так, але пам'ятайте, що буде легше для адміністратора сервера або когось іншого отримати доступ до ваших нотаток, якщо вони отримають доступ до вашого облікового запису Nextcloud.
    enterEncPassword(OUTDATED): "Для захисту ваших даних, будь ласка, введіть ваш пароль шифрування:"
    newToSaber(OUTDATED): Нова у Saber? Просто введіть новий пароль шифрування.
    encPassword(OUTDATED): Пароль шифрування
    encFaqTitle(OUTDATED): Часті запитання
    wrongEncPassword(OUTDATED): Дешифрування не вдалося з наданим паролем. Будь ласка, спробуйте ввести його ще раз.
    connectionFailed(OUTDATED): Щось пішло не так при підключенні до сервера. Будь ласка, спробуйте пізніше.
  title(OUTDATED): Увійти
  signup(rich,OUTDATED): Тисні немає ще? ${linkToSignup(Зареєструватися зараз)}!
  notYou(rich,OUTDATED): Не ти? ${undoLogin(Вибрати інший обліковий запис)}.
profile:
  quickLinks:
    serverHomepage(OUTDATED): Головна сторінка сервера
    deleteAccount(OUTDATED): Видалити обліковий запис
  faq:
  - q(OUTDATED): Чи втрачу я свої нотатки, якщо вийду з системи?
    a(OUTDATED): Ваші нотатки залишаться як на вашому пристрої, так і на сервері. Вони не будуть синхронізовані з сервером доти, доки ви не увійдете знову. Переконайтеся, що синхронізація завершена перед виходом (подивіться на прогрес синхронізації на головному екрані), щоб не втратити жодних даних.
  - q(OUTDATED): Як змінити пароль у Nextcloud?
    a(OUTDATED): Перейдіть на вебсайт вашого сервера та увійдіть. Потім перейдіть до Налаштування > Безпека > Змінити пароль. Вам потрібно буде вийти та увійти назад до Saber після зміни пароля.
  - q(OUTDATED): Як змінити пароль шифрування?
    a(OUTDATED): |-
      0. Переконайтеся, що синхронізація завершена (подивіться на прогрес синхронізації на головному екрані).
      1. Вийдіть з облікового запису Saber.
      2. Перейдіть на вебсайт вашого сервера та видаліть папку 'Saber'. Це видалить усі ваші нотатки з сервера.
      3. Увійдіть назад у Saber. Ви можете вибрати новий пароль шифрування при вході.
      4. Не забудьте вийти та увійти назад у Saber на інших пристроях також.
  - q(OUTDATED): Як я можу видалити свій обліковий запис?
    a(OUTDATED): |-
      Натисніть на кнопку "@:profile.quickLinks.deleteAccount" вище та увійдіть у систему, якщо потрібно.
      Якщо ви використовуєте офіційний сервер Saber, ваш обліковий запис буде видалено після 1 тижневого періоду графіка. Ви можете зв'язатися зі мною за адресою adilhanney@disroot.org протягом цього періоду, щоб скасувати видалення.
      Якщо ви використовуєте сторонній сервер, у вас може не бути опції видалення вашого облікового запису: вам потрібно буде ознайомитися з політикою конфіденційності сервера для отримання додаткової інформації.
  title(OUTDATED): Мій профіль
  logout(OUTDATED): Вийти
  quotaUsage(OUTDATED): Ви використовуєте $used з $total ($percent%)
  connectedTo(OUTDATED): Підключено до
  faqTitle(OUTDATED): Часті запитання
