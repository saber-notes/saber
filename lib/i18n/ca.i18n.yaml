login:
  form:
    agreeToPrivacyPolicy(rich,OUTDATED): Al iniciar sesión, aceptas la ${linkToPrivacyPolicy(Política de privacidad)}.
  status:
    loggedOut(OUTDATED): Desconnectat
    tapToLogin(OUTDATED): Toca per iniciar la sessió amb Nextcloud
    hi(OUTDATED): Hola, $u!
    almostDone(OUTDATED): Pràcticament preparat per a sincronització, toca per finalitzar la connexió
    loggedIn(OUTDATED): Ingessat amb Nextcloud
  ncLoginStep:
    loginFlow:
      pleaseAuthorize(OUTDATED): Permeta a Saber accedir a la teva compte de Nextcloud
      followPrompts(OUTDATED): Si us plauseguda les instruccions a l'interfície de Nextcloud
      browserDidntOpen(OUTDATED): La pàgina de connexió no s'ha obert? Clic aquí
    whereToStoreData(OUTDATED): "Escollreu on où voleu guardar els teus dades:"
    saberNcServer(OUTDATED): Serveur Nextcloud de Saber
    otherNcServer(OUTDATED): Un servidor Nextcloud
    serverUrl(OUTDATED): URL del servidor
    loginWithSaber(OUTDATED): Inglesar amb Saber
    loginWithNextcloud(OUTDATED): Inglesar amb Nextcloud
  encLoginStep:
    encFaq:
    - q(OUTDATED): Què és una contrasenya de cifratge? Per què utilitzar dues contrasenyes?
      a(OUTDATED): |-
        La contrasenya de Nextcloud es la que se utiliza para acceder a la nube. La contrasenya de cifrado "scrambles" tus datos antes de que lleguen a la nube.
        Incluso si alguien obtiene acceso a tu cuenta de Nextcloud, tus notas seguirán a salvo y cifradas con una contraseña separada. Esto te proporciona una segunda capa de seguridad para proteger tus datos.
        Nadie puede acceder a tus notas en el servidor sin tu contraseña de cifrado, pero esto también significa que si olvidas tu contraseña de cifrado, perderás el acceso a tus datos.
    - q(OUTDATED): No he menet altrepass de cifratge fins ara. On l'obtenc?
      a(OUTDATED): |-
        Escoll un nou contrasen de cifratge i introduïu-lo a la sota.
        Saber generarà les teves clau de cifratge automàticament a partir d'aquest contrasen.
    - q(OUTDATED): Pucso el mate de la teva compte de Nextcloud?
      a(OUTDATED): Sí, pero ten en cuenta que sería más fácil para el administrador del servidor o alguien más acceder a tus notas si obtienen acceso a tu cuenta de Nextcloud.
    enterEncPassword(OUTDATED): "Per protegere i tuoi dati, inserisci la tua password di crittografia:"
    newToSaber(OUTDATED): Nou en Saber? Simplement ingresa una nova contrasenya de cifratura.
    encPassword(OUTDATED): contraseña de cifrado
    encFaqTitle(OUTDATED): Preguntes freqüents
    wrongEncPassword(OUTDATED): Descodificació fallada amb la contrasenya proporcionada. Si us plau, intenteu introduir-la de nou.
    connectionFailed(OUTDATED): Vaixament va tenir lloc connectar-se al servidor. Si us plau, intenteu de nou més tard.
  title(OUTDATED): Inloguin
  signup(rich,OUTDATED): No tens aún? ${linkToSignup(Registra't-te ara)}.
  notYou(rich,OUTDATED): No tu? ${undoLogin(Elegir otra cuenta)}.
