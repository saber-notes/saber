    tapToLogin: Ấn để đăng nhập bằng Nextcloud
    hi: Xin chào, $u!
    almostDone: Sắp xong rồi, chạm vào màn hình để hoàn tất đăng nhập
    loggedIn: Đã đăng nhập bằng Nextcloud
  ncLoginStep:
    whereToStoreData: "Chọn nơi lưu trữ dữ liệu của bạn:"
    saberNcServer: Máy chủ Nextcloud của Saber
    otherNcServer: Các máy chủ Nextcloud khác
    serverUrl: Đường dẫn máy chủ
    loginWithSaber: Đăng nhập bằng Saber
    loginWithNextcloud: Đăng nhập bằng Nextcloud
    loginFlow:
      pleaseAuthorize: Vui lòng cho phép Saber truy cập vào tài khoản Nextcloud của bạn
      followPrompts: Vui lòng làm theo các hướng dẫn trên giao diện Nextcloud
      browserDidntOpen: Trang đăng nhập không xuất hiện? Hãy ấn vào đây
  encLoginStep:
    enterEncPassword: "Để bảo vệ dữ liệu của bạn, hãy nhập mật khẩu bạn muốn sử dụng để mã hóa chúng:"
    newToSaber: Người mới tới? Bạn chỉ cần nhập một mật khẩu mã hóa mới.
    encPassword: Mật khẩu mã hóa
    encFaqTitle: Các câu hỏi thường gặp
    wrongEncPassword: Không thể giải mã với khóa mã hóa được cung cấp. Hãy nhập lại.
    connectionFailed: Đã xảy ra lỗi khi kết nối đến máy chủ. Vui lòng thử lại sau.
    encFaq:
    - q: Mật khẩu mã hóa là gì? Tại sao lại phải dùng hai mật khẩu?
      a: |-
        Mật khẩu Nextcloud được dùng để truy cập vào lưu trữ đám mây. Còn mật khẩu mã hóa sẽ "trộn lẫn" dữ liệu của bạn trước khi chúng được gửi lên đám mây đó.
        Ngay cả khi có ai đó đột nhập được vào tài khoản Nextcloud, các ghi chú của bạn vẫn sẽ an toàn vì đã được mã hóa bằng một mật khẩu riêng biệt. Điều này tạo ra một lớp bảo mật thứ hai để bảo vệ dữ liệu của bạn.
        Không ai có thể xem ghi chú trên máy chủ nếu không có mật khẩu mã hóa. Tuy nhiên, điều này cũng đồng nghĩa với việc nếu bạn quên mật khẩu mã hóa, bạn sẽ mất quyền truy cập vào dữ liệu của chính mình.
    - q: Tôi chưa thiết lập mật khẩu mã hóa. Tôi có thể tạo nó ở đâu?
      a: |-
        Hãy chọn một mật khẩu mã hóa mới và nhập vào ô bên trên.
        Saber sẽ tự động tạo các khóa mã hóa cho bạn từ mật khẩu này.
    - q: Tôi có thể dùng cùng một mật khẩu với tài khoản Nextcloud không?
      a: Được, nhưng hãy lưu ý rằng quản trị viên hoặc bất kỳ ai khác sẽ dễ dàng truy cập vào ghi chú của bạn hơn nếu họ chiếm được quyền truy cập vào tài khoản Nextcloud.
profile:
  title: Hồ sơ của tôi
  logout: Đăng xuất
  quotaUsage: Bạn đã sử dụng $used trên tổng số $total ($percent%)
  connectedTo: Kết nối tới
  quickLinks:
    serverHomepage: Trang chủ
    deleteAccount: Xóa tài khoản
  faqTitle: Các câu hỏi thường gặp
  faq:
  - q: Tôi có bị mất ghi chú nếu đăng xuất không?
    a: Không. Ghi chú của bạn vẫn sẽ được lưu trên cả thiết bị và máy chủ. Tuy nhiên, chúng sẽ không được đồng bộ hóa với máy chủ cho đến khi bạn đăng nhập lại. Hãy đảm bảo quá trình đồng bộ đã hoàn tất trước khi đăng xuất để không bị mất dữ liệu (bạn có thể xem tiến trình đồng bộ tại màn hình chính).
  - q: Làm sao để thay đổi mật khẩu Nextcloud?
    a: Truy cập vào trang web máy chủ của bạn và đăng nhập. Sau đó, đi tới Cài đặt > Bảo mật > Thay đổi mật khẩu. Bạn sẽ cần phải đăng xuất và đăng nhập lại vào Saber sau khi thay đổi mật khẩu.
  - q: Làm sao để thay đổi mật khẩu mã hóa?
    a: |-
      0. Hãy đảm bảo quá trình đồng bộ đã hoàn tất (kiểm tra tiến trình đồng bộ tại màn hình chính).
      1. Đăng xuất khỏi Saber.
      2. Truy cập vào trang web máy chủ của bạn và xóa thư mục 'Saber'. Thao tác này sẽ xóa tất cả ghi chú của bạn khỏi máy chủ.
      3. Đăng nhập lại vào Saber. Bạn có thể chọn một mật khẩu mã hóa mới khi đăng nhập.
      4. Đừng quên đăng xuất và đăng nhập lại vào Saber trên các thiết bị khác của bạn nữa nhé.
  - q: Làm sao để xóa tài khoản của tôi?
    a: |-
      Nhấn vào "@:profile.quickLinks.deleteAccount" ở trên và đăng nhập nếu được yêu cầu.
      Nếu bạn đang sử dụng máy chủ chính thức của Saber, tài khoản của bạn sẽ được xóa sau thời gian chờ 1 tuần. Trong khoảng thời gian này, bạn có thể liên hệ với tôi qua địa chỉ adilhanney@disroot.org để hủy yêu cầu xóa.
      Nếu bạn đang sử dụng máy chủ của bên thứ ba, có thể sẽ không có tùy chọn xóa tài khoản: bạn sẽ cần tham khảo chính sách quyền riêng tư của máy chủ đó để biết thêm thông tin.
