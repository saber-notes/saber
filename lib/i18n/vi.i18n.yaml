sentry:
  consent:
    title: Đóng góp cho Saber?
    description:
      question: Bạn có muốn ứng dụng tự động báo cáo lỗi cho chúng tôi? Điều này sẽ giúp chúng tôi xác định và đưa ra các bản vá kịp thời.
      scope: Báo cáo này có thể chứa các thông tin về thiết bị của bạn và lỗi gặp phải. Chúng tôi đã cố gắng để lọc đi thông tin cá nhân, nhưng vẫn có thể còn sót một số thông tin.
      currentlyOff: Nếu bạn đồng ý, tính năng báo cáo lỗi sẽ được kích hoạt sau khi bạn khởi động lại ứng dụng.
      currentlyOn: Nếu bạn từ chối, vui lòng khởi động lại ứng dụng để vô hiệu hóa tính năng báo cáo lỗi.
      learnMoreInPrivacyPolicy(rich): Tìm hiểu thêm ở ${link(privacy policy)}.
    answers:
      yes: Có
      no: Không
      later: Hỏi lại tôi sau
