login:
  title: Đăng nhập
  form:
    agreeToPrivacyPolicy(rich): Bằng việc đăng nhập, bạn đồng ý với ${linkToPrivacyPolicy(Privacy Policy)}.
  signup(rich): Chưa có tài khoản? ${linkToSignup(Sign up now)}!
