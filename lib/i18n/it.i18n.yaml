login:
  title: Accesso
  form:
    agreeToPrivacyPolicy(rich): Effettuando l'accesso, accetti l'${linkToPrivacyPolicy(Informativa sulla privacy)}.
  signup(rich): Non hai ancora un account? ${linkToSignup(Registrati ora)}!
  notYou(rich): Non sei tu? ${undoLogin(Scegli un altro account)}.
  status:
    loggedOut: Disconnesso
    tapToLogin: Tocca per accedere con Nextcloud
    hi: Ciao, $u!
    almostDone: Quasi pronto per la sincronizzazione, tocca per completare l'accesso
    loggedIn: Effettuato l'accesso con Nextcloud
  ncLoginStep:
    whereToStoreData: "Scegli dove vuoi archiviare i tuoi dati:"
    saberNcServer: Il server Nextcloud di Saber
    otherNcServer: Altro server Nextcloud
    serverUrl: URL Server
    loginWithSaber: Accedi con Saber
    loginWithNextcloud: Accedi con Nextcloud
    loginFlow:
      pleaseAuthorize: Autorizza Saber ad accedere al tuo account Nextcloud
      followPrompts: Seguire le istruzioni nell'interfaccia Nextcloud
      browserDidntOpen: La pagina di accesso non si è aperta? Clicca qui
  encLoginStep:
    enterEncPassword: "Per proteggere i tuoi dati, inserisci la tua password di cifratura:"
    newToSaber: Nuovo su Saber? Basta inserire una nuova password di cifratura.
    encPassword: Password di cifratura
    encFaqTitle: Domande frequenti
    wrongEncPassword: La decrittazione non è riuscita con la password fornita. Per favore prova a inserirla nuovamente.
    connectionFailed: Qualcosa è andato storto durante la connessione al server. Per favore riprova più tardi.
    encFaq:
    - q: Cos'è una password di cifratura? Perché usare due password?
      a: |-
        La password Nextcloud viene utilizzata per accedere al cloud. La password di cifratura "rimescola" i tuoi dati prima che raggiungano il cloud.
         Anche se qualcuno riesce ad accedere al tuo account Nextcloud, le tue note rimarranno al sicuro e criptate con una password separata. Ciò fornisce un secondo livello di sicurezza per proteggere i tuoi dati.
         Nessuno può accedere alle tue note sul server senza la tua password di cifratura, ma ciò significa anche che se dimentichi la tua password di cifratura, perderai l'accesso ai tuoi dati.
    - q: Non ho ancora impostato una password di cifratura. Come posso ottenerla?
      a: |-
        Scegli una nuova password di cifratura e inseriscila sopra.
        Saber genererà automaticamente le chiavi di cifratura da questa password.
    - q: Posso utilizzare la stessa password del mio account Nextcloud?
      a: Sì, ma tieni presente che sarebbe più semplice per l'amministratore del server o per qualcun altro accedere alle tue note se avessero accesso al tuo account Nextcloud.
profile:
  title: Il mio profilo
  logout: Disconnessione
  quotaUsage: Stai usando $used su $total ($percent%)
  connectedTo: Collegato a
  quickLinks:
    serverHomepage: Homepage del server
    deleteAccount: Elimina account
  faqTitle: Domande frequenti
  faq:
  - q: Perderò le mie note se mi disconnetto?
    a: No. Le tue note rimarranno sia sul tuo dispositivo che sul server. Non verranno sincronizzate con il server finché non effettuerai nuovamente l'accesso. Assicurati che la sincronizzazione sia completata prima di disconnetterti in modo da non perdere alcun dato (vedi l'avanzamento della sincronizzazione nella schermata home).
  - q: Come cambio la mia password Nextcloud?
    a: Vai al sito web del tuo server e accedi. Quindi vai in Impostazioni > Sicurezza > Cambia password. Dovrai disconnetterti e riconnetterti a Saber dopo aver cambiato la tua password.
  - q: Come cambio la mia password di cifratura?
    a: |-
      0. Assicurati che la sincronizzazione sia completata (vedi l'avanzamento della sincronizzazione nella schermata home).
      1. Disconnettiti da Saber. 
      2. Vai al sito Web del tuo server ed elimina la cartella "Saber". Questo eliminerà tutte le tue note dal server.
      3. Accedi nuovamente a Saber. Puoi scegliere una nuova password di cifratura quando accedi.
      4. Non dimenticare di disconnetterti e accedere nuovamente a Saber anche sugli altri tuoi dispositivi.
  - q: Come posso eliminare il mio account?
    a: |-
      Tocca il pulsante "@:profile.quickLinks.deleteAccount" in alto e, se necessario, accedi.
      Se stai utilizzando il server Saber ufficiale, il tuo account verrà eliminato dopo un periodo di tolleranza di 1 settimana. Puoi contattarmi all'indirizzo adilhanney@disroot.org durante questo periodo per annullare l'eliminazione.
      Se stai utilizzando un server di terze parti, potrebbe non esserci un'opzione per eliminare il tuo account: dovrai consultare la politica sulla privacy del server per ulteriori informazioni.
