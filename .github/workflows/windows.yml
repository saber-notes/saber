name: Build for Windows

on:
  # Enable manual run
  workflow_dispatch:
  push:
    tags:
      - "**"
    branches:
      - "**"
    paths:
      - .github/workflows/windows.yml
      - installers/desktop_inno_script.iss

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    permissions:
      contents: write
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup cache
        uses: actions/cache@v5
        with:
          path: |
            .dart_tool/
            .flutter-plugins-dependencies
            build/
            linux/flutter/ephemeral/
            macos/Flutter/ephemeral/
            packages/**/.dart_tool/
            packages/**/.flutter-plugins-dependencies
            packages/**/pubspec.lock
            windows/flutter/ephemeral/
            ~/.dartServer/
            ~/.dart-tool/
          key: ${{ runner.OS }}-saber-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.OS }}-saber-

      - name: Setup Flutter
        uses: adil192/setup-flutter-submodule@v3
        with:
          flutter-path: submodules/flutter
          cache-flutter: false
      - name: Patch Flutter for Windows stylus buttons support
        shell: bash
        run: |
          git -C submodules/flutter config user.name "github-actions[bot]"
          git -C submodules/flutter config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ./patches/pre/windows_stylus_buttons.sh

      - name: Disable Flutter CLI animations
        run: flutter config --no-cli-animations

      - run: ./patches/pre/remove_dev_dependencies.sh
      - run: ./patches/pre/remove_linux_dependencies.sh
      - run: ./patches/pre/remove_permission_handler.sh
      - run: flutter pub get
      - run: ./patches/post/patch_rust_versions.sh

      - name: Build Windows
        shell: bash
        run: |
          flutter build windows

      - name: Download Visual C++ Redistributable
        shell: bash
        run: |
          curl -L -o installers/vc_redist.x64.exe https://aka.ms/vs/17/release/vc_redist.x64.exe

      - name: Install Inno Setup
        run: choco install -y innosetup

      - name: Build Windows Installer
        run: ISCC.exe installers/desktop_inno_script.iss

      - name: Rename exe
        id: rename
        shell: bash
        run: |
          export LC_ALL=en_US.utf8
          buildName=$(grep -oP "(?<=buildName = ').*(?=')" lib/data/version.dart)
          installerName="SaberInstaller_v${buildName}.exe"
          echo "installerName=$installerName" >> $GITHUB_OUTPUT

          mv installers/SaberInstaller.exe installers/$installerName

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Saber-Windows
          path: installers/${{ steps.rename.outputs.installerName }}

      - name: Upload to GitHub release
        uses: svenstaro/upload-release-action@v2
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: installers/${{ steps.rename.outputs.installerName }}
