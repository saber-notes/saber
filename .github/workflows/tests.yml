name: Run tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - ci/self-hosted

defaults:
  run:
    shell: bash

jobs:
  run-tests:
    name: Run Flutter tests
    runs-on: [self-hosted, Linux]
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup cache
        uses: actions/cache@v5
        with:
          path: |
            .dart_tool/
            build/
            linux/flutter/ephemeral/
            macos/Flutter/ephemeral/
            windows/flutter/ephemeral/
            .flutter-plugins-dependencies
          key: ${{ runner.OS }}-saber-${{ hashFiles('**/pubspec.lock') }}-${{ hashFiles('**/*.dart') }}
          restore-keys: |
            ${{ runner.OS }}-saber-

      - name: Setup preinstalled flutter
        run: |
          source ~/.bashrc
          echo "FLUTTER_ROOT=$FLUTTER_ROOT"
          echo "PUB_CACHE=$PUB_CACHE"
          if [ -n "$FLUTTER_ROOT" ]; then
            # Update to submodule's ref
            HASH=$(git rev-parse @:./submodules/flutter)
            echo "Resetting $FLUTTER_ROOT to $HASH"
            git -C "$FLUTTER_ROOT" reset --hard "$HASH"

            # Re-export variables
            echo "${FLUTTER_ROOT}/bin" >> $GITHUB_PATH
            echo "${PUB_CACHE:=$HOME/.pub-cache}/bin" >> $GITHUB_PATH
            echo "FLUTTER_ROOT=$FLUTTER_ROOT" >> $GITHUB_ENV
            echo "PUB_CACHE=$PUB_CACHE" >> $GITHUB_ENV
          fi
      - name: Setup Flutter submodule if not preinstalled
        uses: adil192/setup-flutter-submodule@v1
        if: ${{ env.FLUTTER_ROOT == '' }}
        with:
          flutter-path: submodules/flutter

      - run: flutter pub get

      - name: Download Apple fonts
        run: dart run golden_screenshot:download_apple_fonts

      - name: Run tests
        id: tests
        run: flutter test --coverage --no-pub --file-reporter=json:test-results.json

      - name: Convert test results to JUnit XML for Codecov
        run: |
          flutter pub add dev:junitify
          dart run junitify -i test-results.json -o test-results.xml

      - name: Upload to Codecov
        if: success()
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: test-results.xml

      - name: Ensure test failures directory exists
        if: failure()
        run: mkdir -p test/failures

      - name: Upload test failures
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: Saber-test-failures
          path: test/failures

      - name: Run static analysis
        run: flutter analyze --no-pub

      - name: Check formatting
        run: dart format lib packages scripts test --output none --set-exit-if-changed
